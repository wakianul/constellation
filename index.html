<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="index_media.css">

<body>
    <div id="universe">
        
        <div id="webcam-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas> </div>

            <div class="box draggable" style="left:1400px; top:800px;"><img style="width: 100%;" src="./img/Star 2.png"></div>

            <div class="box draggable" style="left:1500px; top:120px;"><img style="width: 80%;rotate: 15;" src="./img/Star 2.png"></div>
            <div class="box draggable" style="left:300px; top:720px;"><img style="width: 90%;" src="./img/star.png"></div>

    <script type="module" src="scripts.js"></script>
